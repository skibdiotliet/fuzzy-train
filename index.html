<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>&#8203;</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen font-sans pb-12">

  <header class="p-3 sm:p-4 bg-gray-950/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto flex w-full gap-2">
      <input id="search-input" type="text" placeholder="Search..." class="w-full px-4 py-3 rounded-lg bg-gray-900 text-white border border-gray-800 focus:outline-none focus:border-gray-600 text-base shadow-inner">
      <button id="search-btn" class="bg-gray-800 hover:bg-gray-700 px-5 py-3 rounded-lg font-semibold transition text-base active:scale-95 border border-gray-700">Go</button>
    </div>
  </header>

  <main class="p-3 sm:p-6 max-w-7xl mx-auto space-y-8 mt-2">
    
    <section id="player-section" class="hidden space-y-3">
      <h2 id="active-title" class="text-xl sm:text-2xl font-bold truncate text-white"></h2>
      
      <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800">
        <iframe id="video-frame" src="" class="absolute top-0 left-0 w-full h-full" allowfullscreen></iframe>
      </div>
    </section>

    <section id="recommendations-section" class="hidden space-y-3">
      <h2 class="text-base sm:text-lg font-semibold text-gray-400">More Like This</h2>
      <div id="recommendations-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-6">
        </div>
    </section>

    <section id="continue-section" class="hidden space-y-3">
      <h2 class="text-base sm:text-lg font-semibold text-gray-400">Continue Watching</h2>
      <div id="continue-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-6">
        </div>
    </section>

    <section>
      <h2 id="grid-title" class="text-base sm:text-lg font-semibold mb-3 text-gray-500">Trending</h2>
      <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-6">
        </div>
    </section>

  </main>

  <script>
    // Configuration
    const API_KEY = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI2YzEzMjgxNzc5MjhiNzU0ZjkzM2EwNjcyMDQyOTNmMiIsIm5iZiI6MTc4MjgxMzc0Ni44MTcsInN1YiI6IjZhNDM5NDMyNzg0MmM2NGEyNjJkN2JjNiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.sIzvPwUF5ok6KwryjQeD58PqXtnrVEw23T2JogxtCkY'; // Paste your v3 API Key here
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w500';
    
    // Elements
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const movieGrid = document.getElementById('movie-grid');
    const gridTitle = document.getElementById('grid-title');
    const playerSection = document.getElementById('player-section');
    const activeTitle = document.getElementById('active-title');
    const videoFrame = document.getElementById('video-frame');
    
    const recommendationsSection = document.getElementById('recommendations-section');
    const recommendationsGrid = document.getElementById('recommendations-grid');
    const continueSection = document.getElementById('continue-section');
    const continueGrid = document.getElementById('continue-grid');

    // Load Start Content
    window.onload = () => {
      fetchMovies(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`, movieGrid);
      renderContinueWatching();
    };

    // Search Triggers
    searchBtn.onclick = executeSearch;
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeSearch(); });

    function executeSearch() {
      const query = searchInput.value.trim();
      if (query) {
        gridTitle.innerText = `Results for "${query}"`;
        fetchMovies(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`, movieGrid);
        searchInput.blur();
      }
    }

    // Generic Fetch and Display Data
    async function fetchMovies(url, targetGrid) {
      try {
        const res = await fetch(url);
        const data = await res.json();
        displayMovies(data.results, targetGrid);
      } catch (err) {
        console.error("Error fetching data:", err);
      }
    }

    function displayMovies(movies, targetGrid) {
      targetGrid.innerHTML = '';
      if (!movies || movies.length === 0) {
        targetGrid.innerHTML = '<p class="text-gray-600 col-span-full text-center py-6">No videos found.</p>';
        return;
      }

      movies.forEach(movie => {
        if (!movie.poster_path) return;

        const card = document.createElement('div');
        card.className = 'bg-gray-900 rounded-xl overflow-hidden cursor-pointer active:scale-95 transition duration-200 border border-gray-800 shadow-md flex flex-col h-full';
        card.innerHTML = `
          <img src="${IMAGE_URL}${movie.poster_path}" alt="${movie.title}" class="w-full aspect-[2/3] object-cover" loading="lazy">
          <div class="p-2 sm:p-3 flex-grow flex flex-col justify-center">
            <h3 class="font-medium text-xs sm:text-sm line-clamp-2 text-gray-200">${movie.title}</h3>
            <p class="text-[10px] sm:text-xs text-gray-500 mt-0.5">${movie.release_date ? movie.release_date.split('-')[0] : ''}</p>
          </div>
        `;
        
        card.onclick = () => playMovie(movie);
        targetGrid.appendChild(card);
      });
    }

    // Play Movie & Load Contextual Video Data
    function playMovie(movie) {
      activeTitle.innerText = movie.title;
      playerSection.classList.remove('hidden');
      recommendationsSection.classList.remove('hidden');
      
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Embed source
      videoFrame.src = `https://vidsrc.me/embed/movie/${movie.id}`;

      // Save to Resume / Continue Watching history
      saveToContinueWatching(movie);

      // Fetch "Many More Videos" (Recommendations) based on this specific movie id
      fetchMovies(`${BASE_URL}/movie/${movie.id}/recommendations?api_key=${API_KEY}`, recommendationsGrid);
    }

    // Local Storage Resume Logic
    function saveToContinueWatching(movie) {
      let currentList = JSON.parse(localStorage.getItem('continue_watching')) || [];
      
      // Remove duplicates if it already exists in history
      currentList = currentList.filter(item => item.id !== movie.id);
      
      // Push newest to front of array
      currentList.unshift({
        id: movie.id,
        title: movie.title,
        poster_path: movie.poster_path,
        release_date: movie.release_date
      });

      // Cap shelf at 5 items max for clean mobile viewing
      if (currentList.length > 5) currentList.pop();

      localStorage.setItem('continue_watching', JSON.stringify(currentList));
      renderContinueWatching();
    }

    function renderContinueWatching() {
      const currentList = JSON.parse(localStorage.getItem('continue_watching')) || [];
      if (currentList.length === 0) {
        continueSection.classList.add('hidden');
        return;
      }
      continueSection.classList.remove('hidden');
      displayMovies(currentList, continueGrid);
    }
  </script>
</body>
</html>
